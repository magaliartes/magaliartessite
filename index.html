<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Magali Artes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #fff0f5;
      color: #444;
    }

    header {
      background-color: #ffb6c1;
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    .hero h1 {
      color: #ff69b4;
    }

    .btn {
      background-color: #ff69b4;
      color: white;
      padding: 12px 20px;
      border-radius: 25px;
      text-decoration: none;
      display: inline-block;
      margin-top: 15px;
    }

    .section {
      padding: 30px 20px;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
    }

    footer {
      background-color: #ffb6c1;
      text-align: center;
      padding: 15px;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  Magali Artes 🎀
</header>

<section class="hero">
  <h1>Papelaria personalizada para momentos especiais</h1>
  <p>Feito com carinho para tornar cada ocasião única 💖</p>
  <a class="btn" href="https://wa.me/5511SEUNUMERO">Fazer orçamento</a>
</section>

<section class="section">
  <h2>Portfólio</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
  </div>
</section>

<section class="section">
  <h2>Sobre</h2>
  <p>Na Magali Artes, cada detalhe é pensado com carinho para transformar ideias em lembranças inesquecíveis ✨</p>
</section>

<footer>
  © 2026 Magali Artes
</footer>

</body>
</html>
